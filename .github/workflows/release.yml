name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Existing tag to republish (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: [release-please]
    if: |
      always() &&
      (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch')
    strategy:
      fail-fast: false
      matrix:
        node: [16, 18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || needs.release-please.outputs.tag_name }}

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  verify-version:
    name: Verify version matches tag
    runs-on: ubuntu-latest
    needs: [release-please, test]
    if: |
      always() &&
      needs.test.result == 'success' &&
      (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || needs.release-please.outputs.tag_name }}

      - name: Compare package.json version to tag
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.version || needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${TAG_NAME##*v}"
          echo "package.json version: $PKG_VERSION"
          echo "tag version:          $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [release-please, test, verify-version]
    if: |
      always() &&
      needs.verify-version.result == 'success' &&
      (needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch')
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || needs.release-please.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Upgrade npm (Trusted Publishing requires a recent version)
        run: npm install --global npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Publish with provenance
        run: npm publish --provenance --access public
